<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produtos - STNG</title>
  <link rel="stylesheet" href="meusprodutos.css" />
  <link rel="stylesheet" href="bottom-nav.css" />
</head>
<body>
  <div class="dashboard">
      <header class="header">
      <a href="pessoal.html" class="back"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg></a>
      <h1>Produtos</h1>
            
    
    </header>

    <!-- Comissão Total + Saldo -->
    <section class="summary-box">
      <div class="two-col">
        <div class="left">
          <p class="small-label">Receitas totais</p>
          <p class="big-value" id="total-comissao">Kz 0.00</p>
        </div>
        <div class="right">
          <p class="small-label">Saldo actual</p>
          <p class="big-value" id="saldo-disponivel">Kz 0.00</p>
        </div>
      </div>
    </section>

    <!-- 🔹 Skeleton enquanto carrega -->
    <section id="produtos-skeleton" class="produtos-skeleton">
      <div class="sk-card"></div>
      <div class="sk-card"></div>
      <div class="sk-card"></div>
    </section>

    <!-- 🔹 Lista real -->
    <div class="produtos-container hidden" id="produtos-container"></div>
  </div>

  

  <script type="module" src="./firebase-config.js"></script>
  <script type="module" src="./comprarproduto.js"></script>
  <script type="module" src="./Comprarprodutojs"></script>
</body>
</html>
