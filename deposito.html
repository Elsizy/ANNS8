<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Depósito • STNG</title>

  <link rel="stylesheet" href="deposito.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <a href="home.html" class="back"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg></a>
      <h1>Depósito</h1>

      <!-- ícone para o histórico -->
      <a href="registrodeposito.html" class="history" title="Registros de depósitos">
        <svg width="22" height="18" viewBox="0 0 24 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="0" y="1" width="24" height="2" rx="1" fill="currentColor"/>
          <rect x="0" y="8" width="24" height="2" rx="1" fill="currentColor"/>
          <rect x="0" y="15" width="24" height="2" rx="1" fill="currentColor"/>
</svg>
      </a>
    </header>

    <section class="card">
      <h2>Informe o valor</h2>

      <div class="preset-values">
        <button class="preset" data-value="5000">Kz 5.000</button>
        <button class="preset" data-value="15000">Kz 15.000</button>
        <button class="preset" data-value="40000">Kz 40.000</button>
        <button class="preset" data-value="90000">Kz 90.000</button>
        <button class="preset" data-value="200000">Kz 200.000</button>
      </div>

      <div class="form-group">
        <label for="deposit-amount">Valor (Kz)</label>
        <input type="number" id="deposit-amount" placeholder="Ex.: 5000" min="1" step="1">
      </div>

      <div class="form-group">
        <label>Método</label>
        <button id="pick-method" class="picker">
          <span id="method-label">Selecionar método</span>
          <span class="chev">▾</span>
        </button>
      </div>

      <!-- NOVO: Nota de horário -->
      <!-- <div class="notes">
        <p>🕘 Depósitos disponíveis entre: <strong>9h</strong> e <strong>21h</strong>.</p>
        <p>🪪 Depósito mínimo: <strong>5.000 kz</strong>.</p>
      </div> -->
      <div class="notes">

  <!-- Depósitos disponíveis -->
  <div class="deposit-info-item">
    <div class="info-icon">
      <svg
        class="info-icon-svg"
        viewBox="0 0 24 24"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <circle
          cx="12"
          cy="12"
          r="9.5"
          fill="none"
          stroke="currentColor"
          stroke-width="1.7"
        />

        <path
          d="M12 6.5V12L8.5 14"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </div>

    <p class="info-text">
      <span>Depósitos disponíveis entre:</span>
      <strong>9h e 21h.</strong>
    </p>
  </div>


  <!-- Depósito mínimo -->
  <div class="deposit-info-item">
    <div class="info-icon">
      <svg
        class="info-icon-svg"
        viewBox="0 0 24 24"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <rect
          x="3"
          y="6"
          width="18"
          height="12"
          rx="2"
          fill="none"
          stroke="currentColor"
          stroke-width="1.7"
        />

        <circle
          cx="12"
          cy="12"
          r="2.2"
          fill="none"
          stroke="currentColor"
          stroke-width="1.6"
        />

        <path
          d="M6 9.5V14.5M18 9.5V14.5"
          fill="none"
          stroke="currentColor"
          stroke-width="1.6"
          stroke-linecap="round"
        />
      </svg>
    </div>

    <p class="info-text">
      <span>Depósito mínimo:</span>
      <strong>5.000 kz.</strong>
    </p>
  </div>

                         </div>

      <button id="continue" class="btn-primary">Continuar</button>

      <!-- Caixa de erro dinâmica -->
      <div id="deposit-error" class="alert-error">
        Depósitos só estão disponíveis entre <strong>9h</strong> e <strong>21h</strong>.
      </div>
    </section>
  </div>

  <!-- Modal de método -->
  <div id="method-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Escolha o método</h3>
      <ul id="method-list" class="method-list"></ul>
      <button class="btn-secondary" id="close-method">Cancelar</button>
    </div>
  </div>

  <script type="module" src="./firebase-config.js"></script>
  <script type="module" src="./deposito.js"></script>
</body>
</html>
